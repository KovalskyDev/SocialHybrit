{% extends "base.html" %}

{% block title %}PostDetail{% endblock title %}

{% block content %}

<h3><a href="{% url "post-create" %}">Create Post</a></h2>
<hr>
<div class="row justify-content-center">
    <div class="col-2">
        <h1>All Posts</h1>
    {% for post in posts_objects %}
        <p>Post name: {{ post.name }}</p>
        <a href="{% url 'post-detail' post.pk %}">Деталі поста</a>
    {% endfor %}
    </div>
</div>

{% endblock content %}
