{% extends "base.html" %}

{% block title %}Створити новий допис{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-12 col-md-8 col-lg-6">
        <div class="card border-1 border-light-subtle rounded-3 bg-white shadow-sm create-post-card overflow-hidden">
            
            <div class="card-header bg-white border-bottom py-3 d-flex justify-content-between align-items-center">
                <a href="{% url 'post-list' %}" class="text-decoration-none text-dark small">Скасувати</a>
                <h6 class="m-0 fw-bold">Створити допис</h6>
                <button type="submit" form="post-form" class="btn btn-link text-primary fw-bold p-0 text-decoration-none">
                    Поширити
                </button>
            </div>

            <form method="POST" id="post-form" enctype="multipart/form-data" novalidate>
                {% csrf_token %}
                
                <div class="card-body p-0">
                    <div id="media-preview-container" class="bg-light border-bottom d-none">
                        <div class="position-relative d-flex justify-content-center align-items-center" style="min-height: 200px; background-color: #000;">
                            <img id="image-preview" class="w-100 d-none" style="max-height: 500px; object-fit: contain;">
                            <video id="video-preview" class="w-100 d-none" controls style="max-height: 500px;"></video>
                            <button type="button" id="remove-media" class="btn btn-dark btn-sm position-absolute top-0 end-0 m-2 opacity-75 rounded-circle">
                                <i class="bi bi-x-lg"></i>
                            </button>
                        </div>
                    </div>

                    <div class="p-3 border-bottom d-flex align-items-center bg-white">
                        <label for="id_media" class="btn btn-light border btn-sm fw-bold shadow-sm rounded-pill px-3">
                            <i class="bi bi-camera-fill me-2"></i>Додати фото або відео
                        </label>
                        <input type="file" name="media" id="id_media" accept="image/*,video/*" class="d-none">
                        <span id="file-name-hint" class="small text-muted ms-3">Файл не обрано</span>
                    </div>

                    <div class="p-3 border-bottom bg-light-subtle">
                        <textarea name="name" maxlength="100" required id="id_name" 
                                class="form-control border-0 shadow-none bg-transparent p-0 fw-bold auto-expand" 
                                placeholder="Заголовок допису..." 
                                style="font-size: 1.25rem; resize: none; overflow: hidden; min-height: 30px;"
                                rows="1">{{ form.name.value|default:'' }}</textarea>
                    </div>

                    <div class="p-3">
                        <textarea name="about" maxlength="2200" required id="id_about" 
                                class="form-control border-0 shadow-none p-0 auto-expand" 
                                placeholder="Напишіть щось цікаве..." 
                                style="resize: none; overflow: hidden; font-size: 1rem; min-height: 150px;"
                                rows="1">{{ form.about.value|default:'' }}</textarea>
                        
                        <div class="d-flex justify-content-between align-items-center mt-1">
                            <div id="media-error" class="text-danger small"></div>
                            <div class="text-end">
                                <span id="char-count" class="text-muted" style="font-size: 0.75rem;">0</span>
                                <span class="text-muted" style="font-size: 0.75rem;"> / 2200</span>
                            </div>
                        </div>
                    </div>
                </div>
            </form>

            <script>
                const autoExpandFields = document.querySelectorAll('.auto-expand');
                const textareaAbout = document.getElementById('id_about');
                const charCount = document.getElementById('char-count');
                const MAX_CHARS = 2200;

                // 1. Авто-высота
                const adjustHeight = (el) => {
                    el.style.height = 'auto';
                    el.style.height = el.scrollHeight + 'px';
                };

                autoExpandFields.forEach(field => {
                    field.addEventListener('input', () => adjustHeight(field));
                    adjustHeight(field);
                });

                // 2. Лимит символов
                const handleAboutInput = () => {
                    if (textareaAbout.value.length > MAX_CHARS) {
                        const start = textareaAbout.selectionStart;
                        const end = textareaAbout.selectionEnd;
                        textareaAbout.value = textareaAbout.value.substring(0, MAX_CHARS);
                        textareaAbout.setSelectionRange(start, end);
                    }
                    const currentLength = textareaAbout.value.length;
                    charCount.textContent = currentLength;
                    charCount.className = currentLength >= 2100 ? 'text-danger' : 'text-muted';
                };

                textareaAbout.addEventListener('input', handleAboutInput);
                handleAboutInput();

                // 3. Предпросмотр Медиа
                const mediaInput = document.getElementById('id_media');
                const previewContainer = document.getElementById('media-preview-container');
                const imgPreview = document.getElementById('image-preview');
                const videoPreview = document.getElementById('video-preview');
                const removeMediaBtn = document.getElementById('remove-media');
                const fileNameHint = document.getElementById('file-name-hint');

                mediaInput.addEventListener('change', function() {
                    const file = this.files[0];
                    if (file) {
                        const reader = new FileReader();
                        const isVideo = file.type.startsWith('video/');
                        
                        fileNameHint.textContent = file.name;
                        previewContainer.classList.remove('d-none');
                        
                        if (isVideo) {
                            imgPreview.classList.add('d-none');
                            videoPreview.classList.remove('d-none');
                            videoPreview.src = URL.createObjectURL(file);
                        } else {
                            videoPreview.classList.add('d-none');
                            imgPreview.classList.remove('d-none');
                            imgPreview.src = URL.createObjectURL(file);
                        }
                    }
                });

                removeMediaBtn.addEventListener('click', () => {
                    mediaInput.value = '';
                    fileNameHint.textContent = 'Файл не обрано';
                    previewContainer.classList.add('d-none');
                    imgPreview.src = '';
                    videoPreview.src = '';
                });
            </script>
        </div>
    </div>
</div>

<style>
    body { background-color: #fafafa !important; }
    .form-control:focus { background-color: transparent !important; box-shadow: none !important; }
    .create-post-card { animation: postPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    @keyframes postPop { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
</style>
{% endblock %}
