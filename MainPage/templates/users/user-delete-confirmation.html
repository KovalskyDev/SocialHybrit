{% extends "base.html" %}

{% block title %}DeleteUser{% endblock title %}

{% block content %}
<h1>You will delete user: {{ cmuser_object.username }}</h1>
<br>
<h2>This action cannot be undone!</h2>

<form method="POST">
    {% csrf_token %}
    <button type="submit">Yes, delete forever</button>
</form>
<h1><a href="{% url "user-detail" cmuser_object.pk %}">No, I changed my mind (back)</a></h1>
{% endblock content %}
