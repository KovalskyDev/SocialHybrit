{% extends "base.html" %}

{% block title %}UserUpdate{% endblock title %}

{% block content %}
<h1>You are will update a User: {{ cmuser_object.username }}</h1>
<div style="margin-top: 20px;">
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p}}
        <button type="submit">Update</button>
    </form>
</div>
<hr>
<a href="{% url "user-detail" cmuser_object.pk %}">Go back</a>
{% endblock content %}
